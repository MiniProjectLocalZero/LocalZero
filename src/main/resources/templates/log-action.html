<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LocalZero - Log eco-action</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="stylesheet" th:href="@{/navbar.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h2>Log an eco-action</h2>
    <p>What have you done today to save CO2? Write it down below!</p>

    <form th:action="@{/actions/log}" th:object="${sustainabilityActionDto}" method="post">

        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" th:field="*{title}" required />
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="category">Pick category</label>
            <select id="category" th:field="*{category}">
                <option th:each="cat : ${categories}"
                        th:value="${cat}"
                        th:text="${cat}">Category</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Save action</button>
    </form>
</div>

</body>
</html>
