<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Initiative</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <div class="container">
        <h1>Start a new Initiative</h1>
        <p>Fill in the details below to create a new initiative for your community.</p>

        <div th:if="${param.error}" class="error">
            <p th:text="${param.error}">An error occurred while creating the initiative.</p>
        </div>

        <form th:action="@{/initiatives/create}" th:object="${initiativeDto}" method="post">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" th:field="*{title}" placeholder="Enter initiative title" required>
            </div>

            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" th:field="*{description}" placeholder="Describe your initiative" required></textarea>
            </div>

            <div class="form-group">
                <label for="category">Initiative Category:</label>
                <select id="category" th:field="*{category}">
                    <option th:each="cat : ${T(se.mau.localzero.domain.Category).values()}"
                            th:value="${cat}" th:text="${cat}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="visibility">Visibility</label>
                <select id="visibility" th:field="*{visibility}" required>
                    <option th:each="vis : ${T(se.mau.localzero.domain.Visibility).values()}"
                            th:value="${vis}" th:text="${vis}"></option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="startDate">Start Date:</label>
                    <input type="date" id="startDate" th:field="*{startDate}" required>
                </div>
                <div class="form-group">
                    <label for="endDate">End Date:</label>
                    <input type="date" id="endDate" th:field="*{endDate}" required>
                </div>
            </div>

            <button type="submit" class="btn">Create Initiative</button>
        </form>
        <div class="footer">
            <a th:href="@{/initiatives}">Back to Initiatives</a>
        </div>

    </div>
</body>
