<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>LocalZero - Navbar</title>
    <link rel="stylesheet" th:href="@{/navbar.css}">

</head>
<body>
<nav th:fragment="navbar" class="nav-wrapper">
    <div>
        <h2>LocalZero</h2>
    </div>

    <div class="logged-in-as" sec:authorize="isAuthenticated()">
        <span id="logged-in-span"><strong sec:authentication="name"></strong></span>

        <a th:href="@{/profile}" class="icon-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 class="lucide lucide-user-icon lucide-user">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </a>


        <a th:href="@{/community}" class="icon-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 class="lucide lucide-house-icon lucide-house">
                <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
                <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            </svg>
        </a>

        <a th:href="@{/message}" class="icon-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 class="lucide lucide-message-circle-icon lucide-message-circle">
                <path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/>
            </svg>
        </a>

        <!-- Dropdown menu instead of redirecting to new page -->
        <div class="icon-button notification-container" style="position: relative;">
            <a href="#" id="bell-icon" style="color: inherit; text-decoration: none; display: flex; align-items: center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="lucide lucide-bell-icon lucide-bell">
                    <path d="M10.268 21a2 2 0 0 0 3.464 0"/>
                    <path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>
                </svg>

                <!-- Red dot -->
                <span id="unread-badge" class="notification-badge"
                      th:if="${unreadCount != null and unreadCount > 0}"
                      th:text="${unreadCount}"></span>
            </a>

            <!-- Popup menu for notifications -->
            <div id="notification-dropdown" class="notification-dropdown hidden">
                <div class="dropdown-header">
                    <h4>Notifications</h4>
                    <!-- <a th:href="@{/notification/inbox}">Se all</a> -->
                </div>
                <div class="dropdown-body">

                    <!-- Loop through notifs from Java -->
                    <div th:each="notif : ${recentNotifications}"
                         class="notification-item"
                         th:classappend="${notif.isRead == false} ? 'unread' : ''">
                        <p th:text="${notif.message}"></p>
                        <span class="time" th:text="${notif.timeAgo}"></span>
                    </div>

                    <div th:if="${#lists.isEmpty(recentNotifications)}" class="notification-item">
                        <p>No new notifications.</p>
                    </div>

                </div>
            </div>
        </div>

        <form th:action="@{/logout}" method="post">
            <button id="logout-btn" type="submit">Log out</button>
        </form>
    </div>
    <script th:src="@{/js/notification.js}" defer></script>

</nav>

</body>
</html>
